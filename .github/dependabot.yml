version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    rebase-strategy: "auto"
    ignore:
      # Electron Forge 7 currently requires @electron/fuses 1.x.
      - dependency-name: "@electron/fuses"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "actions"
    rebase-strategy: "auto"
