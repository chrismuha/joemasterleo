# Dependabot updates are squash-merged only after the build check succeeds.

name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: read
  contents: write
  pull-requests: write

jobs:
  merge-after-build:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Read Dependabot update metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for successful build
        shell: bash
        run: |
          for attempt in {1..120}; do
            check="$({
              gh api \
                "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs?per_page=100" \
                --jq '([.check_runs[] | select(.name == "build")] | sort_by(.started_at) | last) // {}'
            })"

            status="$(jq -r '.status // "missing"' <<< "$check")"
            conclusion="$(jq -r '.conclusion // ""' <<< "$check")"

            echo "Build check status: $status${conclusion:+ ($conclusion)}"

            if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
              exit 0
            fi

            if [[ "$status" == "completed" ]]; then
              echo "The build check did not succeed; leaving the pull request open."
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for the build check; leaving the pull request open."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Merge tested commit
        run: |
          gh pr merge \
            --squash \
            --delete-branch \
            --match-head-commit "$HEAD_SHA" \
            "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
