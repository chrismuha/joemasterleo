name: Code Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Verify Tracked Files
        shell: bash
        run: |
          git ls-files | grep -q .

          while IFS= read -r file; do
            [ -s "$file" ] || {
              echo "Empty tracked file: $file"
              exit 1
            }
          done < <(
            git ls-files \
              '*.html' \
              '*.css' \
              '*.js' \
              '*.json' \
              '*.md' \
              '*.yml' \
              '*.yaml'
          )
